[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = ["dist"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
minversion = "9.1"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-config",
    "--strict-markers",
    "--cov=.",
    "--cov-branch",
    "--cov-report=term-missing",
]

[tool.coverage.run]
branch = true
source = ["."]
omit = [
    "backfill_ids.py",
    "cloudinary_cleaner.py",
    "dist/*",
    "tests/*",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
skip_covered = true
exclude_also = [
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
