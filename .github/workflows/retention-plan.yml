name: Cloudinary Retention Dry Run

on:
  workflow_dispatch:
    inputs:
      minimum_age_days:
        description: "Only plan unreferenced resources older than this"
        required: true
        default: 30
        type: number

permissions:
  contents: read

concurrency:
  group: cloudinary-retention-plan
  cancel-in-progress: false

jobs:
  plan:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: cloudinary-retention-plan
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Validate all canonical JSON first
        run: python manage.py validate-data

      - name: Create dry-run manifest
        env:
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MINIMUM_AGE_DAYS: ${{ inputs.minimum_age_days }}
        run: |
          python cloudinary_cleaner.py --minimum-age-days "$MINIMUM_AGE_DAYS" --manifest-output retention-plan.json

      - name: Upload manifest for human review
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudinary-retention-plan-${{ github.run_id }}
          path: retention-plan.json
          if-no-files-found: error
          retention-days: 90
