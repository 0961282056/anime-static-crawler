name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint workflows and shell scripts
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
        run: |
          actionlint_archive="$RUNNER_TEMP/actionlint.tar.gz"
          shellcheck_archive="$RUNNER_TEMP/shellcheck.tar.xz"

          curl --fail --show-error --silent --location \
            --output "$actionlint_archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${actionlint_archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$actionlint_archive" --directory "$RUNNER_TEMP" actionlint

          curl --fail --show-error --silent --location \
            --output "$shellcheck_archive" \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  ${shellcheck_archive}" | sha256sum --check --strict
          tar --extract --xz --file "$shellcheck_archive" --directory "$RUNNER_TEMP"

          actionlint="$RUNNER_TEMP/actionlint"
          shellcheck="$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          "$actionlint" -version
          "$shellcheck" --version
          "$actionlint" -shellcheck "$shellcheck"
          "$shellcheck" --severity=warning build.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Verify isolated Cloudflare build
        env:
          BUILD_VERSION: "ci-build-lock"
        run: |
          python -m venv "$RUNNER_TEMP/cloudflare-build-venv"
          source "$RUNNER_TEMP/cloudflare-build-venv/bin/activate"
          bash build.sh

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Verify dependency graph
        run: python -m pip check

      - name: Verify lock files are current
        run: |
          python -m piptools compile --resolver=backtracking --strip-extras --allow-unsafe --generate-hashes --newline=LF -o requirements-build.txt requirements-build.in
          python -m piptools compile --resolver=backtracking --strip-extras --allow-unsafe --generate-hashes --newline=LF -o requirements-canary.txt requirements-canary.in
          python -m piptools compile --resolver=backtracking --strip-extras --allow-unsafe --generate-hashes --newline=LF -o requirements.txt requirements.in
          python -m piptools compile --resolver=backtracking --strip-extras --allow-unsafe --generate-hashes --no-annotate --newline=LF -o requirements-dev.txt requirements-dev.in
          git diff --exit-code -- requirements-build.txt requirements-canary.txt requirements.txt requirements-dev.txt
          if [[ -n "$(git status --porcelain --untracked-files=all -- requirements-build.txt requirements-canary.txt requirements.txt requirements-dev.txt)" ]]; then
            git status --short --untracked-files=all -- requirements-build.txt requirements-canary.txt requirements.txt requirements-dev.txt
            exit 1
          fi

      - name: Lint and format
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run tests
        run: python -m pytest

      - name: Enforce retention CLI coverage
        run: python -m coverage report --include=cloudinary_cleaner.py --fail-under=70

      - name: Audit Python dependencies
        run: python -m pip_audit --require-hashes -r requirements.txt

      - name: Build deterministic static output
        env:
          BUILD_ONLY: "true"
          BUILD_VERSION: "ci"
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python generate_static.py
          python manage.py validate-all
          python manage.py quality-report >> "$GITHUB_STEP_SUMMARY"
          node --check static/js/main.js

      - name: Install browser smoke-test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        run: |
          python -m http.server 4173 --bind 127.0.0.1 --directory dist > "$RUNNER_TEMP/static-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          server_ready=false
          for _ in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              server_ready=true
              break
            fi
            sleep 0.5
          done
          if [[ "$server_ready" != "true" ]]; then
            cat "$RUNNER_TEMP/static-server.log"
            exit 1
          fi
          npm run test:e2e
