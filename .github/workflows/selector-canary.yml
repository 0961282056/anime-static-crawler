name: Daily Source Selector Canary

on:
  schedule:
    - cron: "15 9 * * *"
      timezone: "Asia/Taipei"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-selector-canary
  cancel-in-progress: true

jobs:
  selector-canary:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-canary.txt

      - name: Install locked read-only dependencies
        run: python -m pip install --require-hashes -r requirements-canary.txt

      - name: Check live source selector contract
        run: python manage.py selector-canary

  notify-failure:
    needs: selector-canary
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.selector-canary.result != 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: crawler-production
    steps:
      - name: Checkout notification code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install locked notification dependencies
        run: python -m pip install --require-hashes -r requirements-build.txt

      - name: Send sanitized Discord failure alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: python manage.py notify-selector-canary-failure
