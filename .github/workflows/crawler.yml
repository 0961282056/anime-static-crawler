name: Scheduled Anime Crawler

on:
  schedule:
    # 每天 UTC 17:00 (台灣時間凌晨 01:00) 自動執行
    - cron: '0 17 * * *'
  workflow_dispatch:
  push:
    # 只要修改 templates 底下的檔案，就自動觸發重新生成 (視圖層即時更新)
    paths:
      - 'templates/**'

# 【防撞鎖定機制】確保同一個時間點，只會有一個爬蟲實例在運行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # 設定為 false：若已有排程在執行，新的觸發會進入「等待 (Pending)」，避免強制中斷正在上傳圖片的進程
  cancel-in-progress: false

jobs:
  crawl-and-update:
    runs-on: ubuntu-24.04

    # 全域環境變數設定
    env:
      # 【時區校正】強制容器使用台灣時間，確保 python 的 datetime.now() 邊界判斷正確
      TZ: Asia/Taipei
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BUILD_ONLY: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 確保拉取完整的 commit 歷史，避免靜態生成時發生基準點偏移
          fetch-depth: 1 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Crawler & Generate Static Files
        run: |
          python generate_static.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Crawler'
          git config --global user.email 'action@github.com'

          # 【殭屍檔案修復】使用 --all 強制 Git 追蹤檔案的「刪除 (Deleted)」狀態
          git add --all dist/data/
          git add cloudinary_cache.json

          # 檢查暫存區是否有實質變更
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto-update anime data & cache"
            git push
            echo "✅ Data pushed to GitHub. Cloudflare Pages should trigger build now."
          fi