name: Cloudinary Retention Execute

on:
  workflow_dispatch:
    inputs:
      plan_run_id:
        description: "Successful Retention Dry Run workflow run ID (at least 30 days old)"
        required: true
        type: number
      confirmation:
        description: "Type DELETE_UNREFERENCED exactly"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: anime-cloudinary-mutations
  cancel-in-progress: false

jobs:
  prepare-cache-invalidation:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: cloudinary-retention-execute
    outputs:
      base_sha: ${{ steps.prepared.outputs.base_sha }}
      cache_changed: ${{ steps.prepared.outputs.cache_changed }}
      cache_sha256: ${{ steps.prepared.outputs.cache_sha256 }}
      candidate_count: ${{ steps.prepared.outputs.candidate_count }}
      manifest_sha256: ${{ steps.prepared.outputs.manifest_sha256 }}
      trusted_created_at: ${{ steps.provenance.outputs.created_at }}
    steps:
      - name: Checkout exact reviewed main revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Enforce destructive maintenance gate
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          SCHEDULE_ENABLED: ${{ vars.CRAWLER_SCHEDULE_ENABLED }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Retention must run from main."
            exit 1
          fi
          if [[ "$SCHEDULE_ENABLED" != "false" ]]; then
            echo "CRAWLER_SCHEDULE_ENABLED must exist and equal lowercase false."
            exit 1
          fi
          if [[ "$CONFIRMATION" != "DELETE_UNREFERENCED" ]]; then
            echo "The exact DELETE_UNREFERENCED confirmation is required."
            exit 1
          fi

      - name: Refuse retention while any pull request is open
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open_prs="$(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json headRefName,url \
            --jq '.[] | "\(.headRefName) \(.url)"')"
          if [[ -n "$open_prs" ]]; then
            echo "Close or merge every main pull request before retention:"
            printf '%s\n' "$open_prs"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Validate fresh canonical data
        run: python manage.py validate-data

      - name: Verify dry-run provenance and download manifest
        id: provenance
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
        run: |
          if [[ ! "$PLAN_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "plan_run_id must be an integer"
            exit 1
          fi
          run_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PLAN_RUN_ID")"
          workflow_path="$(jq -r .path <<< "$run_json")"
          case "$workflow_path" in
            .github/workflows/retention-plan.yml|.github/workflows/retention-plan.yml@main|.github/workflows/retention-plan.yml@refs/heads/main) ;;
            *) echo "Unexpected retention plan workflow path: $workflow_path"; exit 1 ;;
          esac
          test "$(jq -r .head_branch <<< "$run_json")" = "main"
          test "$(jq -r .conclusion <<< "$run_json")" = "success"
          test "$(jq -r .event <<< "$run_json")" = "workflow_dispatch"
          run_created_at="$(jq -r .created_at <<< "$run_json")"
          test -n "$run_created_at"
          test "$run_created_at" != "null"
          echo "created_at=$run_created_at" >> "$GITHUB_OUTPUT"
          mkdir retention-download
          gh run download "$PLAN_RUN_ID" \
            --name "cloudinary-retention-plan-$PLAN_RUN_ID" \
            --dir retention-download
          test -f retention-download/retention-plan.json

      - name: Prepare reversible cache invalidation and self-hashed receipt
        env:
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CONFIRMATION: ${{ inputs.confirmation }}
          GH_TOKEN: ${{ github.token }}
          RETENTION_EXECUTION_CONTEXT: protected-github-environment
          RETENTION_EXPECTED_MAIN_SHA: ${{ github.sha }}
          RETENTION_TRUSTED_CREATED_AT: ${{ steps.provenance.outputs.created_at }}
        run: |
          python cloudinary_cleaner.py \
            --prepare-execution \
            --manifest-input retention-download/retention-plan.json \
            --execution-output retention-execution.json \
            --confirm "$CONFIRMATION"

      - name: Validate prepared artifact and expose immutable outputs
        id: prepared
        run: |
          test -f retention-execution.json
          test -f cloudinary_cache.json
          jq -e '.schema_version == 1' retention-execution.json > /dev/null

          base_sha="$(jq -r .base_sha retention-execution.json)"
          cache_sha256="$(jq -r .cache_sha256 retention-execution.json)"
          candidate_count="$(jq -r '.delete_candidates | length' retention-execution.json)"
          manifest_sha256="$(jq -r .manifest_sha256 retention-execution.json)"
          actual_cache_sha256="$(sha256sum cloudinary_cache.json | cut -d ' ' -f 1)"
          source_manifest_sha256="$(jq -r .manifest_sha256 retention-download/retention-plan.json)"

          test "$base_sha" = "$(git rev-parse HEAD)"
          test "$cache_sha256" = "$actual_cache_sha256"
          test "$manifest_sha256" = "$source_manifest_sha256"
          [[ "$candidate_count" =~ ^[0-9]+$ ]]

          mapfile -d '' changed_paths < <(git diff --name-only -z)
          if (( ${#changed_paths[@]} == 0 )); then
            cache_changed=false
          elif (( ${#changed_paths[@]} == 1 )) && [[ "${changed_paths[0]}" == "cloudinary_cache.json" ]]; then
            cache_changed=true
          else
            printf 'Unexpected prepared path: %s\n' "${changed_paths[@]}"
            exit 1
          fi
          if [[ "$candidate_count" == "0" && "$cache_changed" == "true" ]]; then
            echo "A zero-candidate plan must not mutate the cache."
            exit 1
          fi

          git diff --check
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "cache_changed=$cache_changed" >> "$GITHUB_OUTPUT"
          echo "cache_sha256=$cache_sha256" >> "$GITHUB_OUTPUT"
          echo "candidate_count=$candidate_count" >> "$GITHUB_OUTPUT"
          echo "manifest_sha256=$manifest_sha256" >> "$GITHUB_OUTPUT"
          {
            echo "### Prepared retention"
            echo "- Candidates: $candidate_count"
            echo "- Cache changed: $cache_changed"
            echo "- No Cloudinary resource has been deleted yet."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable prepared retention artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: retention-prepared-${{ github.run_id }}
          path: |
            retention-execution.json
            retention-download/retention-plan.json
            cloudinary_cache.json
          if-no-files-found: error
          retention-days: 30
          overwrite: true

  publish-cache-pr:
    needs: prepare-cache-invalidation
    if: needs.prepare-cache-invalidation.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: automation-publisher
    permissions:
      actions: read
      contents: read
    outputs:
      cache_changed: ${{ steps.cache-changes.outputs.changed }}
      pr_url: ${{ steps.publish.outputs.pr_url }}
      safe_main_sha: ${{ steps.result.outputs.safe_main_sha }}
    steps:
      - name: Checkout prepared base without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare-cache-invalidation.outputs.base_sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Download prepared retention artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: retention-prepared-${{ github.run_id }}
          path: .retention-prepared

      - name: Validate and apply prepared cache
        id: cache-changes
        env:
          BASE_SHA: ${{ needs.prepare-cache-invalidation.outputs.base_sha }}
          EXPECTED_CACHE_CHANGED: ${{ needs.prepare-cache-invalidation.outputs.cache_changed }}
          EXPECTED_CACHE_SHA256: ${{ needs.prepare-cache-invalidation.outputs.cache_sha256 }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.prepare-cache-invalidation.outputs.manifest_sha256 }}
        run: |
          test "$(git rev-parse HEAD)" = "$BASE_SHA"
          test -f .retention-prepared/retention-execution.json
          test -f .retention-prepared/retention-download/retention-plan.json
          test -f .retention-prepared/cloudinary_cache.json
          test "$(jq -r .base_sha .retention-prepared/retention-execution.json)" = "$BASE_SHA"
          test "$(jq -r .cache_sha256 .retention-prepared/retention-execution.json)" = "$EXPECTED_CACHE_SHA256"
          test "$(jq -r .manifest_sha256 .retention-prepared/retention-execution.json)" = "$EXPECTED_MANIFEST_SHA256"
          test "$(sha256sum .retention-prepared/cloudinary_cache.json | cut -d ' ' -f 1)" = "$EXPECTED_CACHE_SHA256"
          test "$(jq -r .manifest_sha256 .retention-prepared/retention-download/retention-plan.json)" = "$EXPECTED_MANIFEST_SHA256"

          cp .retention-prepared/cloudinary_cache.json cloudinary_cache.json
          if git diff --quiet -- cloudinary_cache.json; then
            actual_changed=false
          else
            actual_changed=true
          fi
          test "$actual_changed" = "$EXPECTED_CACHE_CHANGED"
          mapfile -d '' changed_paths < <(git diff --name-only -z)
          if [[ "$actual_changed" == "true" ]]; then
            (( ${#changed_paths[@]} == 1 ))
            test "${changed_paths[0]}" = "cloudinary_cache.json"
          else
            (( ${#changed_paths[@]} == 0 ))
          fi
          git diff --check
          echo "changed=$actual_changed" >> "$GITHUB_OUTPUT"

      - name: Create short-lived automation token
        if: steps.cache-changes.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Publish and merge cache-first safety pull request
        if: steps.cache-changes.outputs.changed == 'true'
        id: publish
        env:
          BASE_SHA: ${{ needs.prepare-cache-invalidation.outputs.base_sha }}
          EXPECTED_CACHE_SHA256: ${{ needs.prepare-cache-invalidation.outputs.cache_sha256 }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          open_automation_prs="$(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json headRefName,url \
            --jq '.[] | select(.headRefName | startswith("automation/")) | "\(.headRefName) \(.url)"')"
          if [[ -n "$open_automation_prs" ]]; then
            echo "Resolve the existing automation pull request first:"
            printf '%s\n' "$open_automation_prs"
            exit 1
          fi

          gh auth setup-git
          git fetch origin main --depth=2
          if [[ "$(git rev-parse origin/main)" != "$BASE_SHA" ]]; then
            echo "main changed before the cache safety PR was published."
            exit 1
          fi

          branch="automation/retention-cache-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch -c "$branch"
          bot_login="${APP_SLUG}[bot]"
          bot_id="$(gh api "/users/$bot_login" --jq .id)"
          git config user.name "$bot_login"
          git config user.email "${bot_id}+${bot_login}@users.noreply.github.com"
          git add -- cloudinary_cache.json
          staged_paths="$(git diff --cached --name-only)"
          if [[ "$staged_paths" != "cloudinary_cache.json" ]]; then
            echo "Unexpected staged paths:"
            printf '%s\n' "$staged_paths"
            exit 1
          fi
          if [[ -n "$(git diff --cached --name-only --diff-filter=D)" ]]; then
            echo "Automation is not allowed to delete the cache file."
            exit 1
          fi
          git diff --cached --check
          git commit -m "chore(cache): prepare Cloudinary retention"

          remote_branch_pushed=false
          pr_created=false
          cleanup_unpublished_branch() {
            if [[ "$remote_branch_pushed" == "true" && "$pr_created" != "true" ]]; then
              git push origin --delete "$branch" || true
            fi
          }
          trap cleanup_unpublished_branch EXIT
          git push --set-upstream origin "$branch"
          remote_branch_pushed=true

          pr_url="$(gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(cache): prepare Cloudinary retention" \
            --body "Invalidates reviewed retention candidates in cache before any Cloudinary deletion. Quality Gate must pass before the protected delete job can start.")"
          pr_created=true
          merged=false
          cleanup_unmerged_pr() {
            if [[ "$merged" != "true" ]]; then
              gh pr merge "$pr_url" --disable-auto || true
              gh pr close "$pr_url" --delete-branch || true
            fi
          }
          trap cleanup_unmerged_pr EXIT

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Cache-first safety pull request: $pr_url" >> "$GITHUB_STEP_SUMMARY"
          head_sha="$(git rev-parse HEAD)"
          gh pr merge "$pr_url" \
            --auto \
            --squash \
            --delete-branch \
            --match-head-commit "$head_sha"

          for attempt in {1..120}; do
            pr_state="$(gh pr view "$pr_url" --json state --jq .state)"
            if [[ "$pr_state" == "MERGED" ]]; then
              merged=true
              break
            fi
            if [[ "$pr_state" == "CLOSED" ]]; then
              echo "The cache safety pull request closed without merging."
              exit 1
            fi
            sleep 15
          done
          if [[ "$merged" != "true" ]]; then
            echo "The cache safety pull request did not merge before the safety timeout."
            exit 1
          fi

          safe_main_sha="$(gh pr view "$pr_url" --json mergeCommit --jq .mergeCommit.oid)"
          git fetch origin main --depth=2
          test "$(git rev-parse origin/main)" = "$safe_main_sha"
          test "$(git rev-parse "$safe_main_sha^")" = "$BASE_SHA"
          mapfile -d '' merged_paths < <(git diff --name-only -z "$BASE_SHA" "$safe_main_sha")
          (( ${#merged_paths[@]} == 1 ))
          test "${merged_paths[0]}" = "cloudinary_cache.json"
          merged_cache_sha256="$(git show "$safe_main_sha:cloudinary_cache.json" | sha256sum | cut -d ' ' -f 1)"
          test "$merged_cache_sha256" = "$EXPECTED_CACHE_SHA256"

          echo "safe_main_sha=$safe_main_sha" >> "$GITHUB_OUTPUT"
          echo "Cache safety PR merged at $safe_main_sha." >> "$GITHUB_STEP_SUMMARY"
          trap - EXIT

      - name: Confirm already-safe cache needs no pull request
        if: steps.cache-changes.outputs.changed == 'false'
        env:
          BASE_SHA: ${{ needs.prepare-cache-invalidation.outputs.base_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          remote_main_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)"
          test "$remote_main_sha" = "$BASE_SHA"
          echo "Cache already excluded every prepared candidate; no PR was needed." >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve cache-safe main revision
        id: result
        env:
          BASE_SHA: ${{ needs.prepare-cache-invalidation.outputs.base_sha }}
          CACHE_CHANGED: ${{ steps.cache-changes.outputs.changed }}
          PUBLISHED_SHA: ${{ steps.publish.outputs.safe_main_sha }}
        run: |
          if [[ "$CACHE_CHANGED" == "true" ]]; then
            safe_main_sha="$PUBLISHED_SHA"
          else
            safe_main_sha="$BASE_SHA"
          fi
          if [[ ! "$safe_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "A valid cache-safe main SHA was not produced."
            exit 1
          fi
          echo "safe_main_sha=$safe_main_sha" >> "$GITHUB_OUTPUT"

  delete-cloudinary:
    needs: [prepare-cache-invalidation, publish-cache-pr]
    if: >-
      needs.prepare-cache-invalidation.outputs.candidate_count != '0' &&
      needs.publish-cache-pr.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: cloudinary-retention-execute
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Checkout cache-safe main revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.publish-cache-pr.outputs.safe_main_sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Download immutable prepared retention artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: retention-prepared-${{ github.run_id }}
          path: .retention-prepared

      - name: Re-enforce destructive maintenance gate
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          SAFE_MAIN_SHA: ${{ needs.publish-cache-pr.outputs.safe_main_sha }}
          SCHEDULE_ENABLED: ${{ vars.CRAWLER_SCHEDULE_ENABLED }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$SCHEDULE_ENABLED" != "false" ]]; then
            echo "CRAWLER_SCHEDULE_ENABLED changed; refusing Cloudinary deletion."
            exit 1
          fi
          if [[ "$CONFIRMATION" != "DELETE_UNREFERENCED" ]]; then
            echo "The exact DELETE_UNREFERENCED confirmation is required."
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$SAFE_MAIN_SHA"
          remote_main_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)"
          test "$remote_main_sha" = "$SAFE_MAIN_SHA"

          open_prs="$(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json headRefName,url \
            --jq '.[] | "\(.headRefName) \(.url)"')"
          if [[ -n "$open_prs" ]]; then
            echo "A new main pull request appeared after cache preparation:"
            printf '%s\n' "$open_prs"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Validate cache-safe canonical data
        run: python manage.py validate-data

      - name: Delete only the cache-safe prepared candidates
        env:
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CONFIRMATION: ${{ inputs.confirmation }}
          GH_TOKEN: ${{ github.token }}
          RETENTION_EXECUTION_CONTEXT: protected-github-environment
          RETENTION_EXPECTED_MAIN_SHA: ${{ needs.publish-cache-pr.outputs.safe_main_sha }}
          RETENTION_TRUSTED_CREATED_AT: ${{ needs.prepare-cache-invalidation.outputs.trusted_created_at }}
        run: |
          python cloudinary_cleaner.py \
            --execute-prepared \
            --manifest-input .retention-prepared/retention-download/retention-plan.json \
            --execution-input .retention-prepared/retention-execution.json \
            --confirm "$CONFIRMATION"

      - name: Revalidate data after deletion
        run: |
          python manage.py validate-data
          {
            echo "### Cloudinary retention complete"
            echo "- Cache safety revision: ${{ needs.publish-cache-pr.outputs.safe_main_sha }}"
            echo "- Candidates: ${{ needs.prepare-cache-invalidation.outputs.candidate_count }}"
          } >> "$GITHUB_STEP_SUMMARY"
